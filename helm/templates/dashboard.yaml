            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "histogram_quantile(0.50, sum(rate(robotlb_reconcile_duration_seconds_bucket{controller=\"$controller\"}[$__rate_interval])) by (le))",
              "legendFormat": "p50",
              "refId": "B"
