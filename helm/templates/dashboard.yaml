        {
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "description": "Duration of reconcile operations over time",
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "custom": {
