suite: ServiceMonitor
templates:
  - servicemonitor.yaml
tests:
  - it: should not render service monitor by default
    set:
      metrics.enabled: true
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render service monitor when metrics disabled
    set:
      metrics.enabled: false
      metrics.serviceMonitor.enabled: true
    asserts:
      - hasDocuments:
          count: 0

  - it: should render service monitor when both enabled
    set:
      metrics.enabled: true
      metrics.serviceMonitor.enabled: true
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ServiceMonitor

  - it: should use correct interval and timeout
    set:
      metrics.enabled: true
      metrics.serviceMonitor.enabled: true
      metrics.serviceMonitor.interval: 60s
      metrics.serviceMonitor.scrapeTimeout: 30s
    asserts:
      - equal:
          path: spec.endpoints[0].interval
          value: 60s
      - equal:
          path: spec.endpoints[0].scrapeTimeout
          value: 30s
